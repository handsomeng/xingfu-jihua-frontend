<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="theme-color" content="#FAF6EE" />
<title>欢迎 · 幸福计划</title>
<link rel="stylesheet" href="assets/styles.css" />
</head>
<body class="onboarding-body">

<div class="onboarding-shell">

  <!-- 顶栏：跳过 -->
  <header class="onboarding-top">
    <button class="onboarding-skip" id="skip-btn">跳过</button>
  </header>

  <!-- 滑动卡片区 -->
  <div class="onboarding-viewport">
    <div class="onboarding-track" id="track">

      <section class="onboarding-slide" data-slide="1">
        <div class="onboarding-art onboarding-art-1">
          <div class="onboarding-spark spark-a">✦</div>
          <div class="onboarding-spark spark-b">✦</div>
          <div class="onboarding-spark spark-c">✦</div>
          <div class="onboarding-orb"></div>
        </div>
        <div class="onboarding-eyebrow">第一件事</div>
        <h1 class="onboarding-title">
          把幸福，<br/>从一种运气，<br/>变成一种本事。
        </h1>
        <p class="onboarding-subtitle">
          你不是不够幸福。<br/>更可能是，从来没人教过你怎么练它。
        </p>
      </section>

      <section class="onboarding-slide" data-slide="2">
        <div class="onboarding-art onboarding-art-2">
          <div class="onboarding-step">
            <div class="onboarding-step-no">1</div>
            <div class="onboarding-step-label">读 5 分钟<br/>当天主题</div>
          </div>
          <div class="onboarding-step">
            <div class="onboarding-step-no">2</div>
            <div class="onboarding-step-label">19 道小题<br/>边做边觉察</div>
          </div>
          <div class="onboarding-step">
            <div class="onboarding-step-no">3</div>
            <div class="onboarding-step-label">AI 教练给你<br/>一份今日报告</div>
          </div>
        </div>
        <div class="onboarding-eyebrow">怎么练</div>
        <h1 class="onboarding-title">
          每天 15 分钟<br/>陪你走 71 天。
        </h1>
        <p class="onboarding-subtitle">
          不需要打卡焦虑。<br/>每天读一段、做几道题、看一份只属于你的报告。
        </p>
      </section>

      <section class="onboarding-slide" data-slide="3">
        <div class="onboarding-art onboarding-art-3">
          <div class="onboarding-pill">耶鲁《幸福课》</div>
          <div class="onboarding-pill">Seligman · PERMA</div>
          <div class="onboarding-pill">哈佛 80 年追踪</div>
        </div>
        <div class="onboarding-eyebrow">为什么靠谱</div>
        <h1 class="onboarding-title">
          底层是<br/>被反复验证的科学。
        </h1>
        <p class="onboarding-subtitle">
          积极心理学过去 40 年最稳的几条研究，<br/>翻译成你日常能用上的小动作。
        </p>
        <div class="onboarding-cta-wrap">
          <button class="btn-primary" id="start-btn">开始今天</button>
        </div>
      </section>

    </div>
  </div>

  <!-- 进度点 + 主 CTA（前两页） -->
  <footer class="onboarding-bottom">
    <div class="onboarding-dots">
      <span class="dot active" data-go="0"></span>
      <span class="dot" data-go="1"></span>
      <span class="dot" data-go="2"></span>
    </div>
    <button class="btn-primary onboarding-next" id="next-btn">下一页</button>
  </footer>

</div>

<!-- 兑换码 sheet（点开始时弹出） -->
<div class="redeem-overlay" id="redeem-overlay"></div>
<div class="redeem-sheet" id="redeem-sheet">
  <div class="sheet-handle"></div>
  <h2 class="redeem-title">请输入兑换码</h2>
  <p class="redeem-subtitle">没有兑换码？<br/>联系拉你来的那个朋友要一个。</p>
  <input id="redeem-input" class="redeem-input" placeholder="例：FYQS-2026" autocomplete="off" autocapitalize="characters" spellcheck="false" />
  <div class="redeem-error" id="redeem-error"></div>
  <button class="btn-primary" id="redeem-submit">解锁，开始</button>
  <button class="btn-ghost" id="redeem-cancel">先回去看看</button>
</div>

<script src="assets/redeem.js"></script>
<script src="assets/onboarding.js"></script>
</body>
</html>
