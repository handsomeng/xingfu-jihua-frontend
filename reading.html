<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="theme-color" content="#FBF6E9" />
<title>核心阅读 · 幸福计划</title>
<link rel="stylesheet" href="assets/immersive.css" />
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>

<div class="paper-bg"></div>
<div class="paper-light"></div>
<div class="paper-light-2"></div>
<div class="paper-vignette"></div>

<div class="app-shell imm-reading-page">
  <div class="imm-topbar">
    <a href="javascript:history.back()" class="imm-icon-btn" aria-label="返回">←</a>
    <div class="imm-topbar-title" id="reading-top">READING</div>
    <span class="spacer-44"></span>
  </div>

  <div id="reading-root">
    <div class="card"><div class="card-body" style="display:flex; justify-content:center; padding: 20px 0;"><div class="loading-dots"><span></span><span></span><span></span></div></div></div>
  </div>
</div>

<script>
const params = new URLSearchParams(location.search);
const dayNum = parseInt(params.get("day") || "1", 10);

document.getElementById("reading-top").textContent = `DAY ${String(dayNum).padStart(2, "0")} · READING`;

async function loadReading() {
  try {
    const res = await fetch(`readings/day${dayNum}.md`);
    if (!res.ok) throw new Error("加载失败");
    const md = await res.text();
    const html = marked.parse(md, { breaks: true, gfm: true });
    document.getElementById("reading-root").innerHTML = `
      <div class="card reading-card reveal" data-delay="1">
        <div class="reading-body">${html}</div>
      </div>
      <div class="reveal" data-delay="3">
        <a href="day.html?day=${dayNum}" class="btn-primary">回 到 今 日 卡 片</a>
      </div>
    `;
    document.title = `Day ${dayNum} 阅读 · 幸福计划`;
  } catch (e) {
    document.getElementById("reading-root").innerHTML = `
      <div class="card"><div class="card-body">加载 Day${dayNum} 阅读失败：${e.message}</div></div>
    `;
  }
}

loadReading();
</script>
</body>
</html>
